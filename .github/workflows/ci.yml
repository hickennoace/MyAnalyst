# CI pipeline. The `web` and `e2e` jobs are live; `api` and `security` are stubs to enable later.
name: CI

on:
  push: { branches: [main] }
  pull_request:

jobs:
  api:
    name: API (lint · type · test · security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # - run: ruff check apps/api
      # - run: mypy apps/api
      # - run: pytest apps/api            # includes tenant-isolation tests (A cannot read B)
      # - run: bandit -r apps/api/app
      # - run: pip-audit

  web:
    name: Web (type · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # playwright.config.ts builds + starts the production server, then runs the suite.
      # No LLM key is configured in CI, so insights fall back to the local templated narrator.
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  security:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # - uses: gitleaks/gitleaks-action@v2
