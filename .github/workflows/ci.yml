# CI pipeline. CONFIG STUB — enable jobs as the apps gain real code.
name: CI

on:
  push: { branches: [main] }
  pull_request:

jobs:
  api:
    name: API (lint · type · test · security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # - run: ruff check apps/api
      # - run: mypy apps/api
      # - run: pytest apps/api            # includes tenant-isolation tests (A cannot read B)
      # - run: bandit -r apps/api/app
      # - run: pip-audit

  web:
    name: Web (type · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  security:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # - uses: gitleaks/gitleaks-action@v2
