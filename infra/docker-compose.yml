# Quantia local dev stack. CONFIG STUB — fill image tags, build contexts, and healthchecks
# before first `docker compose up`. See infra/README.md.
version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: quantia
      POSTGRES_PASSWORD: quantia
      POSTGRES_DB: quantia
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: change-me
      MINIO_ROOT_PASSWORD: change-me
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  api:
    build: ../apps/api          # TODO: add Dockerfile
    env_file: ../.env
    depends_on: [postgres, redis, minio]
    ports: ["8000:8000"]

  worker:
    build: ../apps/api          # same image, runs celery worker
    command: celery -A app.workers.pipeline.celery_app worker -l info
    env_file: ../.env
    depends_on: [postgres, redis, minio]

  web:
    build: ../apps/web          # TODO: add Dockerfile (or run on Vercel)
    env_file: ../.env
    depends_on: [api]
    ports: ["3000:3000"]

volumes:
  pgdata:
  miniodata:
